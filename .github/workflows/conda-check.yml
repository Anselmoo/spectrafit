name: 🐍 CI - Conda

on: [push]

jobs:
  build-linux:
    if: github.repository == 'Anselmoo/spectrafit'
    name: 🏗️ Build (Linux)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - spectrafit
          - spectrafit-jupyter
          - spectrafit-all
          - spectrafit-rixs
      max-parallel: 5

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - name: 🐍 Set up Conda
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: conda-forge,defaults
      - name: 📦 Install spectrafit package
        shell: bash -l {0}
        run: |
          conda info
          conda install -c conda-forge ${{ matrix.package }}
      - name: ✅ Verify Python version
        shell: bash -l {0}
        run: |
          python --version
          which python
